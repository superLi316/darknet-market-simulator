version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: darknet-postgres
    environment:
      POSTGRES_USER: darknet
      POSTGRES_PASSWORD: darknet123
      POSTGRES_DB: darknet_market
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darknet -d darknet_market"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: darknet-redis
    command: redis-server --requirepass darknet123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "darknet123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
