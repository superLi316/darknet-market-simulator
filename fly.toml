app = "darknet-market-sim"

[build]

[env]
  DATABASE_URL = "file:/data/dev.db"
  NEXTAUTH_SECRET = "change-me-to-a-random-string-at-least-32-chars"

[mounts]
  source = "sqlite_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512